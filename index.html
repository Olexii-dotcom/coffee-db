    let currentErrorData = null;
    const inputCode = document.getElementById('input-code');
    const toast = document.getElementById('toast');

    function searchError() {
        const query = inputCode.value.trim().toLowerCase();
        if (!query) return;
        const result = database.find(item => item.code.toLowerCase() === query);
        if (result) {
            currentErrorData = result;
            fillData();
            goTo('screen-desc');
        } else {
            showToast();
        }
    }
    
    function fillData() {
        if (!currentErrorData) return;
        document.getElementById('display-code-1').textContent = currentErrorData.code;
        document.getElementById('display-code-2').textContent = currentErrorData.code;
        document.getElementById('display-code-3').textContent = currentErrorData.code;
        
        // ЗМІНА: innerHTML дозволяє використовувати <b> та <br> теги з Excel
        document.getElementById('text-desc').innerHTML = currentErrorData.desc || "Немає даних";
        document.getElementById('text-cause').innerHTML = currentErrorData.cause || "Немає даних";
        document.getElementById('text-solution').innerHTML = currentErrorData.solution || "Немає даних";
        
        const logoDesc = document.getElementById('logo-desc');
        const logoCause = document.getElementById('logo-cause');
        const logoSolution = document.getElementById('logo-solution');
        const logos = [logoDesc, logoCause, logoSolution];
        
        let logoSrc = '';
        const manufacturer = currentErrorData.manufacturer ? currentErrorData.manufacturer.trim().toLowerCase() : '';
        
        if (manufacturer.includes('melit')) {
            logoSrc = 'image_0.png';
        } else if (manufacturer.includes('wmf')) {
            logoSrc = 'image_1.png';
        }

        logos.forEach(img => {
            if (logoSrc) {
                img.src = logoSrc;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
                img.src = '';
            }
        });
        
        // Скидаємо скрол до верху при відкритті нової помилки
        document.querySelectorAll('.result-box').forEach(box => box.scrollTop = 0);
    }
    
    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
    
    function goHome() {
        inputCode.value = '';
        goTo('screen-home');
        setTimeout(() => inputCode.focus(), 100);
    }
    
    function showToast() {
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }
    
    document.getElementById('btn-search').addEventListener('click', searchError);
    inputCode.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchError();
    });
    
    if ('serviceWorker' in navigator) { 
        navigator.serviceWorker.register('sw.js').catch(()=>{}); 
    }
