<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Коди помилок WMF</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; }
        
        /* ЗМІНА 1: Заголовок став більшим */
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; font-size: 2rem; }
        
        h2 { font-size: 1.2rem; text-transform: uppercase; color: #7f8c8d; margin-top: 0; }
        
        .result-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; min-height: 150px; max-height: 50vh; overflow-y: auto; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.1rem; color: #34495e; line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap; }
        
        .error-code-display { font-size: 2rem; font-weight: bold; color: #c0392b; margin-bottom: 10px; }
        
        input[type="text"] { width: 100%; max-width: 300px; padding: 15px; font-size: 1.5rem; text-align: center; border: 2px solid #bdc3c7; border-radius: 12px; outline: none; transition: border 0.3s; text-transform: uppercase; }
        input[type="text"]:focus { border-color: #3498db; }
        
        .nav-buttons { display: flex; gap: 20px; width: 100%; max-width: 400px; justify-content: space-between; margin-top: auto; margin-bottom: 20px; }
        
        /* ЗМІНА 2: Стилі кнопок - ОДНАКОВИЙ КОЛІР і ВЕЛИКИЙ РОЗМІР */
        button { 
            background-color: #3498db; /* Єдиний синій колір для всіх */
            color: white; 
            border: none; 
            border-radius: 50px; 
            width: 70px;  /* Ширше */
            height: 70px; /* Вище */
            font-size: 40px; /* Велика стрілка */
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
            transition: transform 0.1s, background 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding-bottom: 8px; /* Центрування стрілки */
            font-family: sans-serif; 
        }
        button:active { transform: scale(0.95); }
        
        /* Прибираємо сірий колір для кнопки "Назад", тепер вона теж синя */
        button.btn-back { background-color: #3498db; }
        
        button.btn-home { background-color: #27ae60; width: auto; padding: 0 30px; font-size: 18px; flex-grow: 1; padding-bottom: 0; }
        
        #btn-search { margin-top: 20px; width: 90px; height: 90px; font-size: 50px; padding-bottom: 10px; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

а -> Заблокована форсунка після впускного клапана бойлера -> Змінено редуктор тиску (тільки при низькому тиску)", "solution": "-> Зачекайте, бойлер наповнюється -> Перевірте впускний клапан бойлера -> Перевірте форсунку після впускного клапана бойлера -> Перевірте редуктор тиску \n\n***\n\n Вода наповнюється"}, {"code": "9053", "desc": "Машину слід почистити \n\n***\n\n Потрібна очистка", "cause": "-> Запит на очистку згідно з налаштуванням за замовчуванням 26 год. Видача напоїв не заблокована \n\n***\n\n Запит на очистку за замовчуванням 26 год. [cite_start]Видача напоїв не заблокована. [cite: 2645] \n\n***\n\n Запит на очистку за замовчуванням 26 год. Видача напоїв не блокується. \n\n***\n\n Запит на очистку за замовчуванням 26 год. Видача напоїв не заблокована. \n\n***\n\n Запит на очистку за замовчуванням через 26 год. Видача напоїв не блокується.", "solution": "-> Виконайте очистку. \n\n***\n\n [cite_start]Виконайте очистку. [cite: 2645] \n\n***\n\n Виконайте очистку."}, {"code": "9055", "desc": "Машину необхідно почистити \n\n***\n\n Примусова очистка", "cause": "-> Досягнуто ліміту часу або очистка була перервана. Машину необхідно почистити. Видача кавових напоїв заблокована \n\n***\n\n Досягнуто ліміту часу або очистка була перервана. [cite_start]Видача кавових напоїв заблокована. [cite: 2645] \n\n***\n\n Досягнуто ліміту часу або очистка була перервана. Видача кавових напоїв заблокована. \n\n***\n\n Досягнуто ліміту часу або очистка була перервана. Машину необхідно почистити. Видача кавових напоїв заблокована. \n\n***\n\n Досягнуто ліміту часу або очистку було перервано. Машину необхідно почистити. Видача кавових напоїв заблокована.", "solution": "-> Виконайте очистку. \n\n***\n\n [cite_start]Виконайте очистку. [cite: 2645] \n\n***\n\n Виконайте очистку. \n\n***\n\n Виконайте очистку. \"\"First run-up\"\" скидає лічильник."}, {"code": "9062", "desc": "Кнопка вимкнення натиснута, машина вимкнена. \n\n***\n\n Кнопка вимкнення натиснута, машина вимкнена. [cite     let currentErrorData = null;
    const inputCode = document.getElementById('input-code');
    const toast = document.getElementById('toast');

    function searchError() {
        const query = inputCode.value.trim().toLowerCase();
        if (!query) return;
        const result = database.find(item => item.code.toLowerCase() === query);
        if (result) {
            currentErrorData = result;
            fillData();
            goTo('screen-desc');
        } else {
            showToast();
        }
    }
    
    function fillData() {
        if (!currentErrorData) return;
        document.getElementById('display-code-1').textContent = currentErrorData.code;
        document.getElementById('display-code-2').textContent = currentErrorData.code;
        document.getElementById('display-code-3').textContent = currentErrorData.code;
        document.getElementById('text-desc').textContent = currentErrorData.desc || "Немає даних";
        document.getElementById('text-cause').textContent = currentErrorData.cause || "Немає даних";
        document.getElementById('text-solution').textContent = currentErrorData.solution || "Немає даних";
    }
    
    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
    
    function goHome() {
        inputCode.value = '';
        goTo('screen-home');
        setTimeout(() => inputCode.focus(), 100);
    }
    
    function showToast() {
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }
    
    document.getElementById('btn-search').addEventListener('click', searchError);
    inputCode.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchError();
    });
